<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Печенька и сапер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #1a1a2e; --bg-light: #eef2f5;
            --panel-dark: rgba(45, 45, 68, 0.8); --panel-light: #ffffff;
            --text-dark: #ffffff; --text-light: #2c3e50;
            --accent: #0088cc; --accent-shadow: #005f8d;
        }
        body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 15px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; overflow: hidden; }
        body.dark-theme { background: var(--bg-dark); color: var(--text-dark); }
        body.light-theme { background: var(--bg-light); color: var(--text-light); }
        .hidden { display: none !important; }
        .header-panel { width: 100%; max-width: 400px; background: var(--panel-dark); padding: 12px 15px; border-radius: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .user-block { display: flex; align-items: center; gap: 10px; }
        #userPhoto { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .stats-block { display: flex; gap: 15px; }
        .stat-item { display: flex; flex-direction: column; text-align: center; }
        .stat-label { font-size: 10px; opacity: 0.7; font-weight: bold; }
        .stat-value { font-size: 15px; font-weight: 800; }
        
        .btn { padding: 16px; font-size: 18px; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; margin: 10px 0; width: 100%; text-transform: uppercase; transition: 0.1s; position: relative; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 5px 0 var(--accent-shadow); }
        .btn-primary:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--accent-shadow); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; box-shadow: 0 5px 0 rgba(0,0,0,0.3); }
        .btn-secondary:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        .btn-share { background: #2ecc71; color: white; box-shadow: 0 5px 0 #27ae60; }
        .btn-share:active { transform: translateY(3px); box-shadow: 0 2px 0 #27ae60; }

        .screen-container { width: 100%; max-width: 400px; padding: 25px; border-radius: 24px; background: var(--panel-dark); backdrop-filter: blur(10px); text-align: center; }
        .game-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .cell { aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; background: #3a3a5d; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); transition: 0.1s; cursor: pointer; }
        .cell.revealed { background: rgba(0,0,0,0.15) !important; box-shadow: none !important; cursor: default; }
        .n-1 { color: #3498db; } .n-2 { color: #2ecc71; } .n-3 { color: #e74c3c; } .n-4 { color: #9b59b6; }
        #gameAlert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; background: #e74c3c; color: white; padding: 15px; border-radius: 15px; text-align: center; font-weight: 900; z-index: 1000; transition: 0.4s; }
        #gameAlert.show { top: 20px; }
    </style>
</head>
<body class="dark-theme">
    <div id="gameAlert">БАБАХ!</div>
    <div class="header-panel">
        <div class="user-block"><div id="userPhoto">?</div><div id="userName">Игрок</div></div>
        <div class="stats-block">
            <div class="stat-item"><span class="stat-label">Игр сыграно</span><span class="stat-value" id="gamesPlayed">0</span></div>
            <div class="stat-item"><span class="stat-label">Печеньки</span><span class="stat-value"><span id="cookiesFound">0</span> 🍪</span></div>
        </div>
    </div>

    <div id="menuScreen" class="screen-container">
        <h1>Печенька и сапер</h1>
        <input type="range" id="bombSlider" min="1" max="15" value="5" style="width:100%; margin:20px 0;">
        <p>Бомб: <span id="bombCountDisplay">5</span></p>
        <button class="btn btn-primary" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn btn-secondary" onclick="showScreen('settings')">НАСТРОЙКИ</button>
    </div>

    <div id="gameScreen" class="screen-container hidden">
        <div id="gameBoard" class="game-board"></div>
        <button class="btn btn-secondary" onclick="showScreen('menu')">В МЕНЮ</button>
    </div>

    <div id="settingsScreen" class="screen-container hidden">
        <h1>Настройки</h1>
        <button class="btn btn-share" onclick="shareResults()">ПОДЕЛИТЬСЯ</button>
        <button class="btn btn-primary" onclick="showScreen('menu')">ГОТОВО</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        let stats = { games: 0, cookies: 0 };
        let grid = [], gameOver = false, gameActive = false;

        function shareResults() {
            const text = `Мой рекорд в игре Печенька и сапер: ${stats.cookies} 🍪\n🕹️Попробуй побить мой рекорд! @saper-cookie_bot`;
            if (tg && tg.shareUrl) tg.shareUrl("", text);
            else window.open(`https://t.me/share/url?url=&text=${encodeURIComponent(text)}`);
        }

        function startGame() {
            gameOver = false; gameActive = true;
            const bCount = parseInt(document.getElementById('bombSlider').value);
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            grid = Array(25).fill(0);
            let bombs = Array.from({length: 25}, (_, i) => i).sort(() => Math.random() - 0.5).slice(0, bCount);
            bombs.forEach(p => grid[p] = 'B');

            for (let i = 0; i < 25; i++) {
                if (grid[i] === 'B') continue;
                let r = Math.floor(i/5), c = i%5, count = 0;
                for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
                    let nr=r+dr, nc=c+dc;
                    if (nr>=0 && nr<5 && nc>=0 && nc<5 && grid[nr*5+nc]==='B') count++;
                }
                grid[i] = count;
            }

            grid.forEach((_, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.id = 'cell-'+i;
                cell.onclick = () => handleCell(i, true);
                board.appendChild(cell);
            });
            showScreen('game');
        }

        function handleCell(i, isDirectClick) {
            if (gameOver || document.getElementById('cell-'+i).classList.contains('revealed')) return;
            const cell = document.getElementById('cell-'+i);
            
            // Если это вскрытие соседей, и там бомба — НЕ вскрываем
            if (!isDirectClick && grid[i] === 'B') return;

            cell.classList.add('revealed');

            if (grid[i] === 'B') {
                gameOver = true; gameActive = false; stats.games++;
                document.getElementById('gamesPlayed').textContent = stats.games;
                revealAllBombs();
                triggerAlert('БАБАХ!');
            } else {
                // ПЕЧЕНЬКА: шанс 35% только при ПРЯМОМ клике. 
                // Если клетка вскрыта автоматически (isDirectClick = false), там всегда цифра/пустота.
                if (isDirectClick && Math.random() < 0.35) {
                    cell.innerHTML = '🍪'; stats.cookies++;
                    document.getElementById('cookiesFound').textContent = stats.cookies;
                } else {
                    cell.innerHTML = grid[i] > 0 ? grid[i] : '';
                    if (grid[i] > 0) cell.classList.add('n-' + grid[i]);
                }

                // 40% шанс на вскрытие соседей только при прямом клике
                if (isDirectClick && Math.random() < 0.40) {
                    revealNeighbors(i);
                }
                checkWin();
            }
        }

        function revealNeighbors(i) {
            let r = Math.floor(i/5), c = i%5;
            for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
                let nr=r+dr, nc=c+dc, idx=nr*5+nc;
                if (nr>=0 && nr<5 && nc>=0 && nc<5 && idx !== i) {
                    handleCell(idx, false); // false запрещает взрывы и печеньки у соседей
                }
            }
        }

        function checkWin() {
            const revealed = document.querySelectorAll('.cell.revealed').length;
            const bCount = parseInt(document.getElementById('bombSlider').value);
            if (revealed === 25 - bCount && !gameOver) {
                gameOver = true; gameActive = false; stats.games++;
                document.getElementById('gamesPlayed').textContent = stats.games;
                triggerAlert('ПОБЕДА!');
            }
        }

        function revealAllBombs() {
            grid.forEach((v, idx) => {
                if(v==='B') {
                    const c = document.getElementById('cell-'+idx);
                    c.classList.add('revealed');
                    c.innerHTML = '💣';
                    c.style.background = '#e74c3c';
                }
            });
        }

        function triggerAlert(t) {
            const a = document.getElementById('gameAlert'); a.textContent = t;
            a.classList.add('show'); setTimeout(() => a.classList.remove('show'), 2000);
        }

        function showScreen(id) {
            if (id === 'menu') gameActive = false;
            ['menu', 'game', 'settings'].forEach(s => document.getElementById(s+'Screen').classList.add('hidden'));
            document.getElementById(id+'Screen').classList.remove('hidden');
        }

        document.getElementById('bombSlider').oninput = (e) => document.getElementById('bombCountDisplay').textContent = e.target.value;
        window.onload = () => { if (tg) { tg.ready(); tg.expand(); } };
    </script>
</body>
</html>
