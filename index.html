<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Печенька и сапер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-dark: #1a1a2e;
            --bg-light: #eef2f5;
            --panel-dark: rgba(45, 45, 68, 0.9);
            --panel-light: #ffffff;
            --text-dark: #ffffff;
            --text-light: #2c3e50;
            --accent: #0088cc;
            --accent-shadow: #005f8d;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow: hidden;
            transition: background 0.3s;
            justify-content: flex-start;
        }
        body.dark-theme { background: var(--bg-dark); color: var(--text-dark); }
        body.light-theme { background: var(--bg-light); color: var(--text-light); }
        .hidden { display: none !important; }
        .header-panel {
            width: 100%;
            max-width: 360px;
            min-height: 60px;
            background: var(--panel-dark);
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .light-theme .header-panel { background: var(--panel-light); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .user-block { display: flex; align-items: center; gap: 8px; }
        #userPhoto { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 14px; }
        #userName { font-size: 14px; font-weight: 600; }
        .stats-block { display: flex; gap: 12px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 8px; text-transform: uppercase; opacity: 0.7; }
        .stat-value { font-size: 13px; font-weight: 800; }
        .screen-container { 
            width: 100%;
            max-width: 360px;
            flex: 1;
            max-height: calc(100vh - 100px);
            padding: 20px;
            border-radius: 20px; 
            background: var(--panel-dark);
            backdrop-filter: blur(15px);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }
        .light-theme .screen-container { background: var(--panel-light); }
        h1 { font-size: 22px; margin-bottom: 15px; }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin: 15px 0;
            width: 100%;
        }
        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }
        .light-theme .cell { background: rgba(0,0,0,0.05); }
        .cell.revealed { background: rgba(0,0,0,0.15) !important; box-shadow: none !important; cursor: default; }
        .btn { 
            padding: 14px; 
            font-size: 15px; 
            font-weight: bold; 
            border: none; 
            border-radius: 14px; 
            width: 100%; 
            margin: 6px 0; 
            text-transform: uppercase;
            flex-shrink: 0;
            cursor: pointer;
        }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 0 var(--accent-shadow); }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--accent-shadow); }
        .btn-secondary { background: rgba(128,128,128,0.2); color: inherit; }
        .btn-share { background: #2ecc71; color: white; box-shadow: 0 4px 0 #27ae60; }
        .btn-share:active { transform: translateY(2px); box-shadow: 0 2px 0 #27ae60; }
        .setting-row { margin: 15px 0; text-align: center; display: flex; justify-content: space-between; align-items: center; }
        input[type=range] { width: 100%; margin-top: 8px; accent-color: var(--accent); }
    </style>
</head>
<body class="dark-theme">
    <div class="header-panel">
        <div class="user-block">
            <div id="userPhoto">?</div>
            <span id="userName">Игрок</span>
        </div>
        <div class="stats-block">
            <div class="stat-item"><span class="stat-label">Игры</span><span id="statGames" class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-label">🍪</span><span id="statCookies" class="stat-value">0</span></div>
        </div>
    </div>

    <div id="menuScreen" class="screen-container">
        <h1>Печенька и сапер</h1>
        <div style="margin: 15px 0;">
            <p>Бомб на поле: <span id="bombCountDisplay" style="color: #ff4d4d; font-weight: bold;">5</span></p>
            <input type="range" id="bombRange" min="3" max="15" value="5">
        </div>
        <button class="btn btn-primary" onclick="startGame()">Играть</button>
        <button class="btn btn-secondary" onclick="showScreen('settings')">Настройки</button>
    </div>

    <div id="gameScreen" class="screen-container hidden">
        <div id="gameGrid" class="game-grid"></div>
        <button class="btn btn-secondary" onclick="showScreen('menu')">Сдаться</button>
    </div>

    <div id="settingsScreen" class="screen-container hidden">
        <h1>Настройки</h1>
        <div class="setting-row">
            <span>Темная тема</span>
            <input type="checkbox" id="themeToggle" checked style="width: 20px; height: 20px;">
        </div>
        <button class="btn btn-share" onclick="shareResults()">Поделиться рекордом</button>
        <button class="btn btn-primary" onclick="showScreen('menu')">Назад</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let stats = { games: 0, cookies: 0 };
        let grid = [];
        let gameOver = false;
        let bombCount = 5;

        function init() {
            tg.ready();
            tg.expand();
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('userName').innerText = user.first_name;
                document.getElementById('userPhoto').innerText = user.first_name[0].toUpperCase();
            }
            document.body.className = tg.colorScheme === 'light' ? 'light-theme' : 'dark-theme';
        }

        function shareResults() {
            const shareText = `Мой рекорд в игре Печенька и сапер: ${stats.cookies} 🍪\n\nПопробуй побить мой результат!`;
            const shareUrl = `https://t.me/saper_cookie_bot/app`;
            
            if (tg && tg.shareUrl) {
                tg.shareUrl(shareUrl, shareText);
            } else {
                const fullUrl = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`;
                window.open(fullUrl, '_blank');
            }
        }

        function showScreen(id) {
            ['menu', 'game', 'settings'].forEach(s => document.getElementById(s + 'Screen').classList.add('hidden'));
            document.getElementById(id + 'Screen').classList.remove('hidden');
        }

        function startGame() {
            gameOver = false;
            stats.games++;
            document.getElementById('statGames').innerText = stats.games;
            bombCount = parseInt(document.getElementById('bombRange').value);
            const board = document.getElementById('gameGrid');
            board.innerHTML = '';
            
            grid = Array(25).fill(0);
            let bombsPlaced = 0;
            while (bombsPlaced < bombCount) {
                let idx = Math.floor(Math.random() * 25);
                if (grid[idx] !== 'B') { grid[idx] = 'B'; bombsPlaced++; }
            }

            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'cell-' + i;
                cell.onclick = () => handleCell(i);
                board.appendChild(cell);
            }
            showScreen('game');
        }

        function handleCell(i) {
            if (gameOver || document.getElementById('cell-' + i).classList.contains('revealed')) return;
            const cell = document.getElementById('cell-' + i);
            cell.classList.add('revealed');

            if (grid[i] === 'B') {
                gameOver = true;
                cell.innerText = '💣';
                cell.style.background = '#e74c3c';
                setTimeout(() => { alert('БАБАХ!'); showScreen('menu'); }, 500);
            } else {
                if (Math.random() < 0.2) {
                    cell.innerText = '🍪';
                    stats.cookies++;
                    document.getElementById('statCookies').innerText = stats.cookies;
                } else {
                    cell.innerText = '✔️';
                }
                checkWin();
            }
        }

        function checkWin() {
            const revealed = document.querySelectorAll('.cell.revealed').length;
            if (revealed === 25 - bombCount) {
                gameOver = true;
                setTimeout(() => { alert('ПОБЕДА! 🍪'); showScreen('menu'); }, 500);
            }
        }

        document.getElementById('bombRange').oninput = (e) => document.getElementById('bombCountDisplay').innerText = e.target.value;
        document.getElementById('themeToggle').onchange = (e) => document.body.className = e.target.checked ? 'dark-theme' : 'light-theme';

        init();
    </script>
</body>
</html>
