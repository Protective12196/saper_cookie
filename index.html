<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Sweeper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #1a1a2e; 
            --panel-dark: rgba(45, 45, 68, 0.8);
            --text-dark: #ffffff; 
            --accent: #0088cc; --accent-shadow: #005f8d;
        }
        body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 15px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; background: var(--bg-dark); color: var(--text-dark); overflow: hidden; }
        .hidden { display: none !important; }
        
        .header-panel { width: 100%; max-width: 400px; background: var(--panel-dark); padding: 12px 15px; border-radius: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); }
        .user-block { display: flex; align-items: center; gap: 10px; }
        #userPhoto { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; text-transform: uppercase; font-size: 20px; }
        .stats-block { display: flex; gap: 15px; }
        .stat-item { display: flex; flex-direction: column; text-align: center; }
        .stat-label { font-size: 10px; opacity: 0.7; font-weight: bold; }
        .stat-value { font-size: 15px; font-weight: 800; }
        
        .btn { padding: 16px; font-size: 18px; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; margin: 10px 0; width: 100%; text-transform: uppercase; transition: 0.1s; position: relative; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 5px 0 var(--accent-shadow); }
        .btn-primary:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--accent-shadow); }
        
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; box-shadow: 0 5px 0 rgba(0,0,0,0.3); }
        .btn-secondary:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        
        .btn-share { background: #2ecc71; color: white; box-shadow: 0 5px 0 #27ae60; }
        .btn-share:active { transform: translateY(3px); box-shadow: 0 2px 0 #27ae60; }

        .game-controls-area { width: 100%; max-width: 400px; margin-bottom: 10px; text-align: center; }
        .flags-counter { font-size: 14px; font-weight: bold; color: #ffffff; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .mode-container { display: flex; gap: 10px; width: 100%; }
        .btn-mode { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid transparent; background: rgba(255,255,255,0.05); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-mode.active { border-color: var(--accent); background: rgba(0, 136, 204, 0.3); box-shadow: 0 0 10px rgba(0, 136, 204, 0.5); }

        .screen-container { width: 100%; max-width: 400px; padding: 25px; border-radius: 24px; background: var(--panel-dark); backdrop-filter: blur(10px); text-align: center; }
        .game-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .cell { aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; background: #3a3a5d; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); transition: 0.1s; cursor: pointer; }
        .cell.revealed { background: rgba(0,0,0,0.15) !important; box-shadow: none !important; }
        .cell.flagged { background: #4e4e7a; border: 1px solid var(--accent); }
        
        .n-1 { color: #3498db; } .n-2 { color: #2ecc71; } .n-3 { color: #e74c3c; } 
        
        #gameAlert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; color: white; padding: 15px; border-radius: 15px; text-align: center; font-weight: 900; z-index: 1000; transition: 0.4s; }
        #gameAlert.show { top: 20px; }
        .alert-win { background: #2ecc71 !important; box-shadow: 0 0 20px rgba(46, 204, 113, 0.5); }
        .alert-lose { background: #e74c3c !important; box-shadow: 0 0 20px rgba(231, 76, 60, 0.6); }
    </style>
</head>
<body>
    <div id="gameAlert">ПРОИГРЫШ</div>
    
    <div class="header-panel">
        <div class="user-block"><div id="userPhoto">?</div><div id="userName">Игрок</div></div>
        <div class="stats-block">
            <div class="stat-item"><span class="stat-label">Сыграно игр</span><span class="stat-value" id="gamesPlayed">0</span></div>
            <div class="stat-item"><span class="stat-label">Печеньки</span><span class="stat-value"><span id="cookiesFound">0</span> 🍪</span></div>
        </div>
    </div>

    <div id="menuScreen" class="screen-container">
        <h1>Cookie Sweeper</h1>
        <input type="range" id="bombSlider" min="1" max="15" value="5" style="width:100%; margin:20px 0;">
        <p>Бомб: <span id="bombCountDisplay">5</span></p>
        <button class="btn btn-primary" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn btn-secondary" onclick="showScreen('settings')">НАСТРОЙКИ</button>
    </div>

    <div id="gameScreen" class="screen-container hidden">
        <div class="game-controls-area">
            <div class="flags-counter">Кол-во флажков: <span id="flagsLeft">0</span> 🚩</div>
            <div class="mode-container">
                <button id="modeDig" class="btn-mode active" onclick="setMode('dig')">⛏️ КОПАТЬ</button>
                <button id="modeFlag" class="btn-mode" onclick="setMode('flag')">🚩 ФЛАГ</button>
            </div>
        </div>
        <div id="gameBoard" class="game-board"></div>
        <button class="btn btn-secondary" onclick="showScreen('menu')">В МЕНЮ</button>
    </div>

    <div id="settingsScreen" class="screen-container hidden">
        <h1>Настройки</h1>
        <button class="btn btn-share" onclick="shareResults()">ПОДЕЛИТЬСЯ</button>
        <button class="btn btn-primary" onclick="showScreen('menu')">ГОТОВО</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let stats = { games: 0, cookies: 0 };
        let grid = [], flags = [], gameOver = false, firstMove = true;
        let gameMode = 'dig'; 
        let currentBombCount = 5;

        function initUser() {
            tg.ready(); tg.expand();
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('userName').textContent = user.first_name || "Игрок";
                document.getElementById('userPhoto').textContent = (user.first_name || "И").charAt(0);
            }
        }

        function setMode(mode) {
            gameMode = mode;
            document.getElementById('modeDig').classList.toggle('active', mode === 'dig');
            document.getElementById('modeFlag').classList.toggle('active', mode === 'flag');
        }

        function shareResults() {
            const text = encodeURIComponent(`Мой рекорд в игре Cookie Sweeper: ${stats.cookies} 🍪\n@saper-cookie_bot`);
            tg.openTelegramLink(`https://t.me/share/url?url=&text=${text}`);
        }

        function startGame() {
            gameOver = false; firstMove = true;
            currentBombCount = parseInt(document.getElementById('bombSlider').value);
            document.getElementById('flagsLeft').textContent = currentBombCount;
            setMode('dig');
            
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            grid = Array(25).fill(0);
            flags = Array(25).fill(false);
            
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.id = 'cell-'+i;
                cell.onclick = () => handleCell(i, true);
                board.appendChild(cell);
            }
            showScreen('game');
        }

        function generateBoard(firstClickIndex) {
            let indices = Array.from({length: 25}, (_, i) => i);
            let available = (Math.random() > 0.20) ? indices.filter(idx => idx !== firstClickIndex) : indices;
            let bombPos = available.sort(() => Math.random() - 0.5).slice(0, currentBombCount);
            
            grid = Array(25).fill(0);
            bombPos.forEach(p => grid[p] = 'B');

            for (let i = 0; i < 25; i++) {
                if (grid[i] === 'B') continue;
                let r = Math.floor(i/5), c = i%5, count = 0;
                for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
                    let nr=r+dr, nc=c+dc;
                    if (nr>=0 && nr<5 && nc>=0 && nc<5 && grid[nr*5+nc]==='B') count++;
                }
                grid[i] = count;
            }
        }

        function handleCell(i, isDirectClick) {
            if (gameOver) return;
            const cell = document.getElementById('cell-'+i);

            if (gameMode === 'flag' && isDirectClick && !cell.classList.contains('revealed')) {
                toggleFlag(i); return;
            }
            
            if (flags[i] || cell.classList.contains('revealed')) return;

            if (firstMove && isDirectClick) { generateBoard(i); firstMove = false; }

            if (!isDirectClick && grid[i] === 'B') return;
            
            cell.classList.add('revealed');

            if (grid[i] === 'B') {
                endGame(false);
            } else {
                let cookieChance = currentBombCount / 15; 
                
                if (isDirectClick && Math.random() < cookieChance) {
                    cell.innerHTML = '🍪'; stats.cookies++;
                    document.getElementById('cookiesFound').textContent = stats.cookies;
                } else {
                    cell.innerHTML = grid[i] > 0 ? grid[i] : '';
                    if (grid[i] > 0) cell.classList.add('n-' + grid[i]);
                }

                if (grid[i] === 0) {
                    revealNeighbors(i);
                } else if (isDirectClick && Math.random() < 0.40) {
                    revealNeighbors(i);
                }
                checkWin();
            }
        }

        function toggleFlag(i) {
            const cell = document.getElementById('cell-'+i);
            if (flags[i]) {
                flags[i] = false; cell.innerHTML = ''; cell.classList.remove('flagged');
            } else if (flags.filter(f => f).length < currentBombCount) {
                flags[i] = true; cell.innerHTML = '🚩'; cell.classList.add('flagged');
            }
            document.getElementById('flagsLeft').textContent = currentBombCount - flags.filter(f => f).length;
            checkWin();
        }

        function revealNeighbors(i) {
            let r = Math.floor(i/5), c = i%5;
            for (let dr=-1; dr<=1; dr++) {
                for (let dc=-1; dc<=1; dc++) {
                    let nr=r+dr, nc=c+dc;
                    let idx=nr*5+nc;
                    if (nr>=0 && nr<5 && nc>=0 && nc<5 && idx !== i) {
                        handleCell(idx, false);
                    }
                }
            }
        }

        function checkWin() {
            let correctFlags = 0;
            let wrongFlags = 0;
            for(let i = 0; i < 25; i++) {
                if (flags[i] && grid[i] === 'B') correctFlags++;
                if (flags[i] && grid[i] !== 'B') wrongFlags++;
            }
            if (correctFlags === currentBombCount && wrongFlags === 0 && !gameOver) {
                endGame(true);
            }
        }

        function endGame(isWin) {
            gameOver = true;
            stats.games++;
            document.getElementById('gamesPlayed').textContent = stats.games;
            if (isWin) triggerAlert('ПОБЕДА!', true);
            else { revealAllBombs(); triggerAlert('ПРОИГРЫШ!', false); }
        }

        function revealAllBombs() {
            grid.forEach((v, idx) => {
                if(v==='B') {
                    const c = document.getElementById('cell-'+idx);
                    c.classList.add('revealed'); c.innerHTML = '💣'; c.style.background = '#e74c3c';
                }
            });
        }

        function triggerAlert(t, isWin) {
            const a = document.getElementById('gameAlert');
            a.textContent = t;
            a.className = isWin ? 'show alert-win' : 'show alert-lose';
            setTimeout(() => a.classList.remove('show'), 3000);
        }

        function showScreen(id) {
            ['menu', 'game', 'settings'].forEach(s => document.getElementById(s+'Screen').classList.add('hidden'));
            document.getElementById(id+'Screen').classList.remove('hidden');
        }

        document.getElementById('bombSlider').oninput = (e) => document.getElementById('bombCountDisplay').textContent = e.target.value;
        window.onload = initUser;
    </script>
</body>
</html>
