<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Печенька и сапер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1a1a2e;
            --bg-light: #eef2f5;
            --panel-dark: rgba(45, 45, 68, 0.8);
            --panel-light: #ffffff;
            --text-dark: #ffffff;
            --text-light: #2c3e50;
            --accent: #0088cc;
            --accent-shadow: #005f8d;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
            overflow: hidden;
        }
        
        body.dark-theme { background: var(--bg-dark); color: var(--text-dark); }
        body.light-theme { background: var(--bg-light); color: var(--text-light); }
        
        .hidden { display: none !important; }

        .header-panel {
            width: 100%; max-width: 400px; background: var(--panel-dark);
            padding: 12px 15px; border-radius: 18px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between; z-index: 10;
        }
        .light-theme .header-panel { background: var(--panel-light); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .user-block { display: flex; align-items: center; gap: 10px; }
        #userPhoto { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        
        .stats-block { display: flex; gap: 15px; text-align: center; }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 10px; text-transform: uppercase; opacity: 0.7; font-weight: bold; }
        .stat-value { font-size: 15px; font-weight: 800; }

        .screen-container { 
            width: 100%; max-width: 400px; padding: 25px; border-radius: 24px; 
            background: var(--panel-dark); backdrop-filter: blur(10px); text-align: center;
            position: relative;
        }
        .light-theme .screen-container { background: var(--panel-light); border: 1px solid rgba(0,0,0,0.05); }
        
        .btn { padding: 16px; font-size: 18px; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; margin: 10px 0; width: 100%; transition: 0.1s; text-transform: uppercase; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 5px 0 var(--accent-shadow); }
        .btn-primary:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--accent-shadow); }
        .btn-secondary { background: rgba(128,128,128,0.2); color: inherit; box-shadow: 0 5px 0 rgba(0,0,0,0.2); }
        .btn-secondary:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        
        .btn-share { background: #2ecc71; color: white; box-shadow: 0 5px 0 #27ae60; margin-top: 15px; }
        .btn-share:active { transform: translateY(3px); box-shadow: 0 2px 0 #27ae60; }

        .game-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .cell { 
            aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            font-size: 18px; font-weight: 900; cursor: pointer; background: #3a3a5d; 
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); transition: 0.1s;
        }
        .light-theme .cell { background: #d1d8e0; box-shadow: inset 0 -4px 0 #a5b1be; }
        .cell.revealed { background: rgba(0,0,0,0.15) !important; box-shadow: none !important; cursor: default; }
        
        .n-1 { color: #3498db; } .n-2 { color: #2ecc71; } .n-3 { color: #e74c3c; } .n-4 { color: #9b59b6; }

        #gameAlert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 360px; background: #e74c3c; color: white; 
            padding: 15px; border-radius: 15px; text-align: center;
            font-weight: 900; font-size: 20px; z-index: 1000; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #gameAlert.show { top: 20px; }
        #gameAlert.win { background: #2ecc71; }

        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; padding: 12px; background: rgba(0,0,0,0.05); border-radius: 12px; }
        h1 { font-size: 28px; margin-bottom: 20px; }
    </style>
</head>
<body class="dark-theme">

    <div id="gameAlert">БАБАХ!</div>

    <div class="header-panel">
        <div class="user-block">
            <div id="userPhoto">?</div>
            <div id="userName">Игрок</div>
        </div>
        <div class="stats-block">
            <div class="stat-item"><span class="stat-label">Игр сыграно</span><span class="stat-value" id="gamesPlayed">0</span></div>
            <div class="stat-item"><span class="stat-label">Собрано</span><span class="stat-value"><span id="cookiesFound">0</span> 🍪</span></div>
        </div>
    </div>

    <div class="screen-container" id="menuScreen">
        <h1>Печенька и сапер</h1>
        <div style="margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.1); border-radius: 15px;">
            <p>Бомб на поле: <span id="bombCountDisplay" style="font-weight:bold; color:#e74c3c">5</span></p>
            <input type="range" id="bombSlider" min="1" max="15" value="5" style="width: 100%; margin-top: 10px;">
        </div>
        <button class="btn btn-primary" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn btn-secondary" onclick="showScreen('settings')">НАСТРОЙКИ</button>
    </div>

    <div class="screen-container hidden" id="gameScreen">
        <div class="game-board" id="gameBoard"></div>
        <button class="btn btn-secondary" onclick="showScreen('menu')">В МЕНЮ</button>
    </div>

    <div class="screen-container hidden" id="settingsScreen">
        <h1>Настройки</h1>
        <div class="setting-row">
            <span>Темная тема</span>
            <input type="checkbox" id="themeToggle" checked style="width: 22px; height: 22px; cursor: pointer;">
        </div>
        <button class="btn btn-share" onclick="shareResults()">ПОДЕЛИТЬСЯ</button>
        <button class="btn btn-primary" onclick="showScreen('menu')">ГОТОВО</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        let stats = { games: 0, cookies: 0 };
        let grid = [];
        let gameOver = false;

        function init() {
            if (tg) {
                tg.ready();
                tg.expand();
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    document.getElementById('userName').textContent = user.first_name;
                    document.getElementById('userPhoto').textContent = user.first_name[0].toUpperCase();
                }
            }
        }

        function shareResults() {
            const shareText = `Мой рекорд в игре Печенька и сапер: ${stats.cookies}🍪\n\n🎮 Попробуй побить мой результат!\n@saper_cookie_bot`;
            
            if (tg && tg.shareUrl) {
                tg.shareUrl(shareUrl, shareText);
            } else {
                const fullText = encodeURIComponent(shareText + "\n" + shareUrl);
                window.open(`https://t.me/share/url?url=${shareUrl}&text=${encodeURIComponent(shareText)}`, '_blank');
            }
        }

        function startGame() {
            gameOver = false;
            stats.games++;
            document.getElementById('gamesPlayed').textContent = stats.games;
            const bCount = parseInt(document.getElementById('bombSlider').value);
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            document.getElementById('gameAlert').classList.remove('show');
            
            grid = Array(25).fill(0);
            let bombPos = Array.from({length: 25}, (_, i) => i).sort(() => Math.random() - 0.5).slice(0, bCount);
            bombPos.forEach(pos => grid[pos] = 'B');

            for (let i = 0; i < 25; i++) {
                if (grid[i] === 'B') continue;
                let count = 0;
                let r = Math.floor(i / 5), c = i % 5;
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        let nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < 5 && nc >= 0 && nc < 5 && grid[nr * 5 + nc] === 'B') count++;
                    }
                }
                grid[i] = count;
            }

            grid.forEach((val, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = 'cell-' + i;
                cell.onclick = () => handleCell(i);
                board.appendChild(cell);
            });
            showScreen('game');
        }

        function handleCell(i) {
            if (gameOver || document.getElementById('cell-' + i).classList.contains('revealed')) return;
            const cell = document.getElementById('cell-' + i);
            cell.classList.add('revealed');

            if (grid[i] === 'B') {
                gameOver = true;
                cell.innerHTML = '💣';
                cell.style.background = '#e74c3c';
                revealAllBombs();
                triggerAlert('БАБАХ!', false);
            } else if (grid[i] === 0) {
                revealEmptyCells(i);
                checkWin();
            } else {
                cell.innerHTML = grid[i];
                cell.classList.add('n-' + grid[i]);
                if (Math.random() < 0.15) {
                    cell.innerHTML = '🍪';
                    stats.cookies++;
                    document.getElementById('cookiesFound').textContent = stats.cookies;
                }
                checkWin();
            }
        }

        function revealEmptyCells(i) {
            let r = Math.floor(i / 5), c = i % 5;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    let nr = r + dr, nc = c + dc;
                    let idx = nr * 5 + nc;
                    if (nr >= 0 && nr < 5 && nc >= 0 && nc < 5) {
                        const nextCell = document.getElementById('cell-' + idx);
                        if (!nextCell.classList.contains('revealed')) {
                            nextCell.classList.add('revealed');
                            if (grid[idx] > 0) {
                                nextCell.innerHTML = grid[idx];
                                nextCell.classList.add('n-' + grid[idx]);
                            } else if (grid[idx] === 0) {
                                revealEmptyCells(idx);
                            }
                        }
                    }
                }
            }
        }

        function revealAllBombs() {
            grid.forEach((val, i) => {
                if (val === 'B') {
                    const c = document.getElementById('cell-' + i);
                    c.classList.add('revealed');
                    c.innerHTML = '💣';
                }
            });
        }

        function triggerAlert(text, isWin) {
            const alertBox = document.getElementById('gameAlert');
            alertBox.textContent = text;
            alertBox.className = isWin ? 'win show' : 'show';
            setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
        }

        function checkWin() {
            const revealed = document.querySelectorAll('.cell.revealed').length;
            const bombs = parseInt(document.getElementById('bombSlider').value);
            if (revealed === 25 - bombs && !gameOver) {
                gameOver = true;
                triggerAlert('ПОБЕДА! 🍪✨', true);
            }
        }

        function showScreen(id) {
            document.getElementById('menuScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('settingsScreen').classList.add('hidden');
            document.getElementById(id + 'Screen').classList.remove('hidden');
            if (id === 'menu') document.getElementById('gameAlert').classList.remove('show');
        }

        document.getElementById('bombSlider').oninput = (e) => document.getElementById('bombCountDisplay').textContent = e.target.value;
        document.getElementById('themeToggle').onchange = (e) => {
            document.body.className = e.target.checked ? 'dark-theme' : 'light-theme';
        };

        window.onload = init;
    </script>
</body>
</html>
