<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Печенька и сапер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-dark: #1a1a2e;
            --bg-light: #eef2f5;
            --panel-dark: rgba(45, 45, 68, 0.9);
            --panel-light: #ffffff;
            --text-dark: #ffffff;
            --text-light: #2c3e50;
            --accent: #0088cc;
            --accent-shadow: #005f8d;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            transition: background 0.3s;
        }
        body.dark-theme { background: var(--bg-dark); color: var(--text-dark); }
        body.light-theme { background: var(--bg-light); color: var(--text-light); }
        .hidden { display: none !important; }
        .header-panel {
            width: 100%;
            max-width: 360px;
            background: var(--panel-dark);
            padding: 12px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .light-theme .header-panel { background: var(--panel-light); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .user-block { display: flex; align-items: center; gap: 10px; }
        #userPhoto { width: 35px; height: 35px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .stats-block { display: flex; gap: 15px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 9px; text-transform: uppercase; opacity: 0.7; }
        .stat-value { font-size: 14px; font-weight: 800; }
        .screen-container { 
            width: 100%;
            max-width: 360px;
            padding: 30px 20px;
            border-radius: 28px; 
            background: var(--panel-dark);
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .light-theme .screen-container { background: var(--panel-light); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 26px; margin-bottom: 25px; }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 20px 0;
        }
        .cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }
        .light-theme .cell { background: rgba(0,0,0,0.05); }
        .cell.opened { background: rgba(255,255,255,0.05); cursor: default; }
        .cell.opened.cookie { background: rgba(255, 193, 7, 0.2); }
        .btn { 
            padding: 16px; 
            font-size: 16px; 
            font-weight: bold; 
            border: none; 
            border-radius: 16px; 
            width: 100%; 
            margin: 8px 0; 
            text-transform: uppercase;
            transition: transform 0.1s;
        }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 0 var(--accent-shadow); }
        .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--accent-shadow); }
        .btn-secondary { background: rgba(128,128,128,0.2); color: inherit; }
        .setting-row { margin: 20px 0; text-align: left; }
        input[type=range] { width: 100%; margin-top: 10px; accent-color: var(--accent); }
    </style>
</head>
<body class="dark-theme">
    <div class="header-panel">
        <div class="user-block">
            <div id="userPhoto">?</div>
            <span id="userName">Игрок</span>
        </div>
        <div class="stats-block">
            <div class="stat-item">
                <span class="stat-label">Игры</span>
                <span id="statGames" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">🍪</span>
                <span id="statCookies" class="stat-value">0</span>
            </div>
        </div>
    </div>
    <div id="menuScreen" class="screen-container">
        <h1>Печенька и сапер</h1>
        <div class="setting-row">
            <p>Бомб на поле: <span id="bombCountDisplay" style="color: #ff4d4d; font-weight: bold;">5</span></p>
            <input type="range" id="bombRange" min="3" max="15" value="5">
        </div>
        <button class="btn btn-primary" onclick="startGame()">Играть</button>
        <button class="btn btn-secondary" onclick="showSettings()">Настройки</button>
    </div>
    <div id="gameScreen" class="screen-container hidden">
        <div id="gameGrid" class="game-grid"></div>
        <button class="btn btn-secondary" onclick="exitToMenu()">Сдаться</button>
    </div>
    <div id="settingsScreen" class="screen-container hidden">
        <h1>Настройки</h1>
        <p>Настройки сохранены.</p>
        <button class="btn btn-primary" onclick="exitToMenu()">Назад</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.body.className = tg.colorScheme === 'light' ? 'light-theme' : 'dark-theme';
        if (tg.initDataUnsafe.user) {
            document.getElementById('userName').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('userPhoto').innerText = tg.initDataUnsafe.user.first_name[0];
        }
        let bombsCount = 5;
        let gamesPlayed = 0;
        let totalCookies = 0;
        let gameActive = false;
        let field = [];
        const bombRange = document.getElementById('bombRange');
        const bombDisplay = document.getElementById('bombCountDisplay');
        bombRange.oninput = () => {
            bombsCount = parseInt(bombRange.value);
            bombDisplay.innerText = bombsCount;
        };
        function showScreen(id) {
            ['menuScreen', 'gameScreen', 'settingsScreen'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }
        function showSettings() { showScreen('settingsScreen'); }
        function exitToMenu() { showScreen('menuScreen'); gameActive = false; }
        function startGame() {
            showScreen('gameScreen');
            initGrid();
        }
        function initGrid() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            gameActive = true;
            field = Array(25).fill(0);
            let placed = 0;
            while(placed < bombsCount) {
                let idx = Math.floor(Math.random() * 25);
                if(field[idx] === 0) { field[idx] = 1; placed++; }
            }
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => handleCell(cell, i);
                grid.appendChild(cell);
            }
        }
        function handleCell(cell, idx) {
            if(!gameActive || cell.classList.contains('opened')) return;
            cell.classList.add('opened');
            if(field[idx] === 1) {
                cell.innerText = '💣';
                gameOver(false);
            } else {
                cell.innerText = '🍪';
                cell.classList.add('cookie');
                totalCookies++;
                document.getElementById('statCookies').innerText = totalCookies;
                const openedCount = document.querySelectorAll('.cell.opened').length;
                if(openedCount === 25 - bombsCount) gameOver(true);
            }
        }
        function gameOver(isWin) {
            gameActive = false;
            gamesPlayed++;
            document.getElementById('statGames').innerText = gamesPlayed;
            setTimeout(() => {
                alert(isWin ? "🎉 Победа!" : "💥 Бум!");
                exitToMenu();
            }, 300);
        }
    </script>
</body>
</html>
